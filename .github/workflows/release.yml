# Builds Huddle installers for macOS, Windows, and Linux on every tagged
# release (e.g. `git tag v0.3.0 && git push --tags`) and uploads the
# artifacts to a GitHub Release of the same tag. Can also be triggered
# manually via the Actions tab (workflow_dispatch).
#
# Builds are unsigned (ad-hoc only, via `identity: null` in the mac
# build config — required so the binary launches on Apple Silicon at
# all). Modern macOS reports unsigned downloaded apps as "damaged";
# users clear the quarantine xattr once with `xattr -cr
# /Applications/Huddle.app` (see README). Windows users click "More
# info → Run anyway" past SmartScreen. To switch on real signing
# later, add the secrets called out in the README and electron-builder
# will pick them up automatically.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      # electron-builder reads GH_TOKEN to publish to the matching tag's
      # release; if it doesn't exist yet, it creates a draft release.
      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
