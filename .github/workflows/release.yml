# Builds Huddle installers for macOS, Windows, and Linux on every tagged
# release (e.g. `git tag v0.3.0 && git push --tags`) and uploads the
# artifacts to a GitHub Release of the same tag. Can also be triggered
# manually via the Actions tab (workflow_dispatch).
#
# macOS builds are Developer ID signed + notarized when the signing
# secrets below are populated (CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID,
# APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID) — required for
# electron-updater (Squirrel.Mac) to apply auto-updates. Until the
# secrets exist the mac build falls back to ad-hoc signing (the
# notarize hook skips itself), and downloaded apps need the
# quarantine-xattr workaround in the README. Windows is still unsigned
# (users click "More info → Run anyway" past SmartScreen).
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      # electron-builder reads GH_TOKEN to publish to the matching tag's
      # release; if it doesn't exist yet, it creates a draft release.
      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS-only signing + notarization. Scoped to the mac runner
          # because CSC_LINK on Windows would be misread as a Windows
          # code-signing cert. An empty string reads as "unset" to
          # electron-builder, so unsigned builds still work before the
          # secrets are populated.
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        run: npm run dist -- --publish always
