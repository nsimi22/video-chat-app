# Builds Huddle installers for macOS, Windows, and Linux on every tagged
# release (e.g. `git tag v0.3.0 && git push --tags`) and uploads the
# artifacts to a GitHub Release of the same tag. Can also be triggered
# manually via the Actions tab (workflow_dispatch).
#
# macOS builds are Developer ID signed + notarized when the signing
# secrets below are populated (CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID,
# APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID) — required for
# electron-updater (Squirrel.Mac) to apply auto-updates. Until the
# secrets exist the mac build falls back to ad-hoc signing (the
# notarize hook skips itself), and downloaded apps need the
# quarantine-xattr workaround in the README. Windows is still unsigned
# (users click "More info → Run anyway" past SmartScreen).
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Pin Windows to 2022, not windows-latest: node-pty is a native
        # addon that electron-rebuild compiles with node-gyp, and the
        # windows-latest image moved to Visual Studio 2026 (v18), which the
        # bundled node-gyp can't detect ("unknown version undefined") — the
        # v0.48.0 Windows build failed on exactly that. windows-2022 ships
        # VS 2022 (v17), which node-gyp finds, so the rebuild succeeds.
        os: [macos-latest, windows-2022, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      # Signing + notarization secrets, injected ONLY on the mac runner.
      # Done via a gated step (not inline env) so the vars are genuinely
      # ABSENT on Windows/Linux — an empty CSC_LINK is misread by
      # electron-builder as a broken Windows signing cert and fails the
      # build. GitHub masks these values in logs.
      - name: Configure macOS signing
        if: matrix.os == 'macos-latest'
        run: |
          {
            echo "CSC_LINK=${{ secrets.CSC_LINK }}"
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      # electron-builder reads GH_TOKEN to publish to the matching tag's
      # release; if it doesn't exist yet, it creates a draft release.
      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
